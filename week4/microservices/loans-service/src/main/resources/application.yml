server:
  port: 8090

spring:
  application:
    name: loans-service

  datasource:
    url: jdbc:h2:mem:loansdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  # --- To switch to MySQL for production, comment out the block above and use: ---
  # datasource:
  #   url: jdbc:mysql://localhost:3306/loansdb
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com:
      eazybytes:
        loans: DEBUG
